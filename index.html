<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
display:flex;
height:100vh;
}

#left{
width:300px;
overflow:auto;
border-right:1px solid #333;
}

#right{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.channel{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.channel:hover{
background:#333;
}

.selected{
background:#555;
}

video{
width:80%;
max-width:900px;
}

#topbar{
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div id="left">

<div id="topbar">
<input type="file" id="fileInput" accept=".m3u,.m3u8">
</div>

<div id="channelsContainer"></div>

</div>

<div id="right">

<video id="videoPlayer" controls></video>

</div>

<script>

let hls;
let channels=[];
let currentIndex=-1;

const video=document.getElementById("videoPlayer");
const container=document.getElementById("channelsContainer");
const fileInput=document.getElementById("fileInput");

function playChannel(url){

console.log("Stream:",url);

if(hls){
hls.destroy();
hls=null;
}

if(Hls.isSupported()){

hls=new Hls({enableWorker:true});

hls.loadSource(url);
hls.attachMedia(video);

hls.once(Hls.Events.MANIFEST_PARSED,function(){

video.play().catch(e=>console.log(e));

});

hls.on(Hls.Events.ERROR,function(e,data){

console.log("HLS error",data);

});

}else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src=url;
video.play();

}else{

alert("Browser non supporta HLS");

}

}

function parseM3U(content){

container.innerHTML="";
channels=[];

let lines=content.split("\n");
let name="";

lines.forEach(line=>{

line=line.trim();

if(line.startsWith("#EXTINF")){

let parts=line.split(",");
name=parts[parts.length-1];

}

else if(line.startsWith("http")){

let url=line;

let div=document.createElement("div");

div.className="channel";
div.textContent=name;

div.onclick=function(){

playChannel(url);

currentIndex=channels.indexOf(div);

updateSelection();

};

container.appendChild(div);

channels.push(div);

}

});

}

function updateSelection(){

channels.forEach((c,i)=>{

if(i===currentIndex) c.classList.add("selected");
else c.classList.remove("selected");

});

}

fileInput.addEventListener("change",function(e){

let file=e.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(ev){

parseM3U(ev.target.result);

};

reader.readAsText(file);

});

</script>

</body>
</html>
